spring:
  application:
    name: ticketing-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticketing}
    username: ${SPRING_DATASOURCE_USERNAME:ticketing}
    password: ${SPRING_DATASOURCE_PASSWORD:ticketing}

  jpa:
    hibernate:
      # Schema is owned by Flyway migrations, never by Hibernate.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: ${SMTP_HOST:relay1.dataart.com}
    port: ${SMTP_PORT:25}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

app:
  base-url: ${APP_BASE_URL:http://localhost:4200}
  mail:
    from: ${MAIL_FROM:no-reply@dataart.com}
  verification:
    token-ttl-hours: 24
  reset:
    token-ttl-minutes: 60
  jwt:
    # HS256 signing secret. No default on purpose: the app fails to start unless JWT_SECRET
    # is provided (>= 32 bytes). docker-compose supplies a dev value for local runs.
    secret: ${JWT_SECRET:}
    ttl-seconds: ${JWT_TTL_SECONDS:604800}

server:
  port: 8080
  # Timestamps and app logic operate in UTC.
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
