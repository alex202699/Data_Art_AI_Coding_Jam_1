services:
  db:
    image: postgres:16-alpine
    container_name: ticketing-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
      POSTGRES_USER: ${POSTGRES_USER:-ticketing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketing}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketing} -d ${POSTGRES_DB:-ticketing}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ticketing-backend
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-ticketing}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ticketing}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ticketing}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:4200}
      # Dev-only signing secret so `docker compose up` works out of the box. Override in .env
      # for anything real — the backend refuses to start without a >= 32-byte JWT_SECRET.
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret-change-me-0123456789}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-604800}
      # Defaults to the local Mailpit container so the email flow is testable out of the box.
      # Override to relay1.dataart.com (etc.) in .env for a real SMTP relay.
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      MAIL_FROM: ${MAIL_FROM:-no-reply@dataart.com}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: ticketing-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-4200}:80"

  # --- Dev tooling ---------------------------------------------------------
  # Local SMTP sink + web inbox for testing the email-verification flow.
  mailpit:
    image: axllent/mailpit:latest
    container_name: ticketing-mailpit
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"   # web inbox
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP

  # Web UI for inspecting the PostgreSQL database.
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ticketing-pgadmin
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@dataart.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro

volumes:
  db-data:
  pgadmin-data:
